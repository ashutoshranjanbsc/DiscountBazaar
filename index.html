<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DiscountBazaar - Best Deals</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#ff3b3b;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.search{
text-align:center;
padding:15px;
}

.search input{
width:80%;
padding:10px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

.categories{
text-align:center;
margin:10px;
}

.categories button{
padding:10px 15px;
margin:5px;
border:none;
background:#333;
color:white;
border-radius:5px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:green;
font-size:18px;
}

.rating{
color:orange;
}

.btn{
display:inline-block;
background:#ff3b3b;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:5px;
margin-top:10px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>
🔥 DiscountBazaar - Best Affiliate Deals
</header>

<div class="search">
<input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="categories">
<button onclick="filter('all')">All</button>
<button onclick="filter('electronics')">Electronics</button>
<button onclick="filter('gadgets')">Gadgets</button>
<button onclick="filter('fashion')">Fashion</button>
</div>

<div class="products">

<div class="card electronics">
<img src="https://m.media-amazon.com/images/I/61HqJd9V5aL._SX679_.jpg">
<h3>Boat Rockerz 255</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<p class="price">₹999</p>
<a class="btn" href="#" target="_blank">Buy Now</a>
</div>

<div class="card gadgets">
<img src="https://m.media-amazon.com/images/I/71yzJoE7WlL._SX679_.jpg">
<h3>Noise Smart Watch</h3>
<div class="rating">⭐⭐⭐⭐⭐</div>
<p class="price">₹1499</p>
<a class="btn" href="#" target="_blank">Buy Now</a>
</div>

<div class="card gadgets">
<img src="https://m.media-amazon.com/images/I/61bK6PMOC3L._SX679_.jpg">
<h3>Fire Boltt Watch</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<p class="price">₹1299</p>
<a class="btn" href="#" target="_blank">Buy Now</a>
</div>

<div class="card fashion">
<img src="https://m.media-amazon.com/images/I/61u48FEs0rL._SX679_.jpg">
<h3>Men Running Shoes</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<p class="price">₹799</p>
<a class="btn" href="#" target="_blank">Buy Now</a>
</div>

</div>

<footer>
© 2026 DiscountBazaar | Affiliate Deals
</footer>

<script>

function searchProduct(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let text=card.innerText.toLowerCase();
card.style.display=text.includes(input)?"block":"none";
});
}

function filter(category){
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
if(category==="all"||card.classList.contains(category)){
card.style.display="block";
}else{
card.style.display="none";
}
});
}

</script>

</body>
</html>
